// Zoom & pan
const container = document.getElementById('canvas-container');
const wrap = document.getElementById('svg-wrap');
let scale = 0.65, tx = 30, ty = 30;
let dragging = false, lastX, lastY;

function applyTransform() {
  wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
applyTransform();

container.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.1 : 0.9;
  tx = mx - (mx - tx) * delta;
  ty = my - (my - ty) * delta;
  scale *= delta;
  applyTransform();
}, { passive: false });

container.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX;
  ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});

function resetView() {
  scale = 0.65; tx = 30; ty = 30;
  applyTransform();
}

document.querySelectorAll('#svg-wrap .node').forEach(node => {
  node.style.cursor = 'pointer';
  node.addEventListener('mouseenter', e => {
    const title = node.querySelector('title');
    if (!title) return;
    const fname = title.textContent.trim();
    const funcs = funcMap[fname] || [];
    const rect = node.getBoundingClientRect();
    tooltip.innerHTML = `<strong>${fname}</strong><br><em>${funcs.length} fonctions définies</em>${funcs.length ? '<br><br>' + funcs.map(f=>`<code>${f}</code>`).join(', ') : ''}`;
    tooltip.style.display = 'block';
    tooltip.style.left = (rect.right + 8) + 'px';
    tooltip.style.top = rect.top + 'px';
  });
  node.addEventListener('mouseleave', () => tooltip.style.display = 'none');
});
